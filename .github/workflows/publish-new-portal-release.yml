name: Publish new Portal release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'The workflow run ID to download artifacts from'
        required: true
        type: string
  workflow_run:
    workflows: [Build_and_publish_Topaz_Portal]
    types: [completed]

permissions:
  packages: write
  contents: write
  actions: read
  id-token: write
  attestations: write

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set run ID
      id: set-run-id
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "RUN_ID=${{ github.event.inputs.run_id }}" >> $GITHUB_OUTPUT
          echo "Using manually provided run ID: ${{ github.event.inputs.run_id }}"
        else
          echo "RUN_ID=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          echo "Using workflow_run event run ID: ${{ github.event.workflow_run.id }}"
        fi
    - name: Download artifacts
      uses: actions/download-artifact@v4.3.0
      with:
        github-token: ${{ github.token }}
        run-id: ${{ steps.set-run-id.outputs.RUN_ID }}
        pattern: "!*.dockerbuild"
    - name: Read tag info
      id: read-tag
      run: |
        TAG=$(cat tag-info/tag-info.txt)
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Using release tag: $TAG"
    - name: Copy artifact for Docker
      run: |
        mkdir publish
        cp -a ./portal/. publish/
    - name: Log in to Docker Hub
      uses: docker/login-action@v3.5.0
      with:
        username: thecloudtheory
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Set up Docker
      uses: docker/setup-docker-action@v4
      with:
        daemon-config: |
          {
            "debug": true,
            "features": {
              "containerd-snapshotter": true
            }
          }
    - name: Extract metadata for Portal Docker image
      id: meta
      uses: docker/metadata-action@v5.7.0
      with:
        images: thecloudtheory/topaz-portal
        tags: |
          type=raw,value=${{ steps.read-tag.outputs.tag }}
          type=raw,value=latest
    - name: Build and push Portal Docker image
      id: push
      uses: docker/build-push-action@v6.18.0
      with:
        context: .
        file: ./Topaz.Portal/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    - name: Generate artifact attestation for Portal
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: index.docker.io/thecloudtheory/topaz-portal
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true
