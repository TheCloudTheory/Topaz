name: CI Topaz

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      - 'Examples/**'
      - 'website/**'
      - 'static/**'
      - 'Topaz.MCP/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      checks: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Install nbgv
      run: dotnet tool install -g nbgv
    - name: Install certificate
      run: |
        cd certificate
        ./ubuntu-install.sh
    - name: Configure DNS resolution
      run: |
        sudo ./install/install-linux.sh
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Publish Linux (interim)
      run: dotnet publish ${{ github.workspace }}/Topaz.Host/Topaz.Host.csproj -c Release -r linux-x64 -o ./publish
    - name: Build interim Docker image
      id: push
      uses: docker/build-push-action@v6.18.0
      with:
        context: .
        file: ./Topaz.Host/Dockerfile
        push: false
        tags: topaz/host
        platforms: linux/amd64
    - name: Detect changed paths
      id: changes
      uses: dorny/paths-filter@v3
      with:
        filters: |
          code:
            - 'Topaz.Host/**'
            - 'Topaz.ResourceManager/**'
            - 'Topaz.Shared/**'
            - 'Topaz.Identity/**'
            - 'Topaz.Portal/**'
            - 'Topaz.CLI/**'
            - 'Topaz.CloudEnvironment/**'
            - 'Topaz.Dns/**'
            - 'Topaz.EventPipeline/**'
            - 'Services/**'
            - 'Topaz.Tests.AzureCLI/**'
            - 'Topaz.Tests.AzurePowerShell/**'
          core:
            - 'Topaz.Host/**'
            - 'Topaz.ResourceManager/**'
            - 'Topaz.Shared/**'
            - 'Topaz.Identity/**'
            - 'Services/Topaz.Service.Shared/**'
          keyvault:
            - 'Services/Topaz.Service.KeyVault/**'
          acr:
            - 'Services/Topaz.Service.ContainerRegistry/**'
          storage:
            - 'Services/Topaz.Service.Storage/**'
          servicebus:
            - 'Services/Topaz.Service.ServiceBus/**'
          eventhub:
            - 'Services/Topaz.Service.EventHub/**'
          authorization:
            - 'Services/Topaz.Service.Authorization/**'
          entra:
            - 'Services/Topaz.Service.Entra/**'
          managedidentity:
            - 'Services/Topaz.Service.ManagedIdentity/**'
          resourcegroup:
            - 'Services/Topaz.Service.ResourceGroup/**'
          resourcemanager:
            - 'Services/Topaz.Service.ResourceManager/**'
          subscription:
            - 'Services/Topaz.Service.Subscription/**'
          virtualnetwork:
            - 'Services/Topaz.Service.VirtualNetwork/**'
          portal:
            - 'Topaz.Portal/**'
          terraform:
            - 'Topaz.Tests.Terraform/**'
          azurepowershell:
            - 'Topaz.Tests.AzurePowerShell/**'
          azurecli:
            - 'Topaz.Tests.AzureCLI/**'
    - name: Build test filter
      id: test_filter
      shell: bash
      run: |
        # Manual or nightly trigger: always run everything
        if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
          echo "filter=" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "ps_filter=" >> "$GITHUB_OUTPUT"
          echo "ps_skip=false" >> "$GITHUB_OUTPUT"
          echo "cli_filter=" >> "$GITHUB_OUTPUT"
          echo "cli_skip=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # No code changed (docs/config only): skip tests entirely
        if [[ "${{ steps.changes.outputs.code }}" != "true" ]]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "filter=" >> "$GITHUB_OUTPUT"
          echo "ps_skip=true" >> "$GITHUB_OUTPUT"
          echo "ps_filter=" >> "$GITHUB_OUTPUT"
          echo "cli_skip=true" >> "$GITHUB_OUTPUT"
          echo "cli_filter=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "skip=false" >> "$GITHUB_OUTPUT"

        # Core/shared infrastructure changed: run all tests, no filter
        if [[ "${{ steps.changes.outputs.core }}" == "true" ]]; then
          echo "filter=" >> "$GITHUB_OUTPUT"
          echo "ps_filter=" >> "$GITHUB_OUTPUT"
          echo "ps_skip=false" >> "$GITHUB_OUTPUT"
          echo "cli_filter=" >> "$GITHUB_OUTPUT"
          echo "cli_skip=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Build a per-service vstest filter expression
        PARTS=()
        [[ "${{ steps.changes.outputs.keyvault }}"        == "true" ]] && PARTS+=("FullyQualifiedName~KeyVault")
        [[ "${{ steps.changes.outputs.acr }}"             == "true" ]] && PARTS+=("FullyQualifiedName~ContainerRegistry")
        [[ "${{ steps.changes.outputs.storage }}"         == "true" ]] && PARTS+=("FullyQualifiedName~Storage")
        [[ "${{ steps.changes.outputs.servicebus }}"      == "true" ]] && PARTS+=("FullyQualifiedName~ServiceBus")
        [[ "${{ steps.changes.outputs.eventhub }}"        == "true" ]] && PARTS+=("FullyQualifiedName~EventHub")
        [[ "${{ steps.changes.outputs.authorization }}"   == "true" ]] && PARTS+=("FullyQualifiedName~Authorization")
        [[ "${{ steps.changes.outputs.entra }}"           == "true" ]] && PARTS+=("FullyQualifiedName~Entra")
        [[ "${{ steps.changes.outputs.managedidentity }}" == "true" ]] && PARTS+=("FullyQualifiedName~ManagedIdentity")
        [[ "${{ steps.changes.outputs.resourcegroup }}"   == "true" ]] && PARTS+=("FullyQualifiedName~ResourceGroup")
        [[ "${{ steps.changes.outputs.resourcemanager }}" == "true" ]] && PARTS+=("FullyQualifiedName~ResourceManager")
        [[ "${{ steps.changes.outputs.subscription }}"    == "true" ]] && PARTS+=("FullyQualifiedName~Subscription")
        [[ "${{ steps.changes.outputs.virtualnetwork }}"  == "true" ]] && PARTS+=("FullyQualifiedName~VirtualNetwork")
        [[ "${{ steps.changes.outputs.portal }}"          == "true" ]] && PARTS+=("FullyQualifiedName~Tests.Portal")

        if [[ ${#PARTS[@]} -eq 0 ]]; then
          # Untracked code path changed (e.g. Topaz.CLI): run all tests as safety fallback
          echo "filter=" >> "$GITHUB_OUTPUT"
        else
          JOINED=$(IFS='|'; echo "${PARTS[*]}")
          echo "filter=$JOINED" >> "$GITHUB_OUTPUT"
        fi

        # Build AzurePowerShell test filter (only the 4 services covered by PS tests)
        PS_PARTS=()
        [[ "${{ steps.changes.outputs.keyvault }}"       == "true" ]] && PS_PARTS+=("FullyQualifiedName~AzurePowerShell.KeyVault")
        [[ "${{ steps.changes.outputs.acr }}"            == "true" ]] && PS_PARTS+=("FullyQualifiedName~AzurePowerShell.ContainerRegistry")
        [[ "${{ steps.changes.outputs.storage }}"        == "true" ]] && PS_PARTS+=("FullyQualifiedName~AzurePowerShell.Storage")
        [[ "${{ steps.changes.outputs.resourcegroup }}"  == "true" ]] && PS_PARTS+=("FullyQualifiedName~AzurePowerShell.ResourceGroup")

        if [[ "${{ steps.changes.outputs.azurepowershell }}" == "true" ]]; then
          # PS test files themselves changed: run all PS tests
          echo "ps_skip=false" >> "$GITHUB_OUTPUT"
          echo "ps_filter=" >> "$GITHUB_OUTPUT"
        elif [[ ${#PS_PARTS[@]} -eq 0 ]]; then
          # No PS-related service or test files changed
          echo "ps_skip=true" >> "$GITHUB_OUTPUT"
          echo "ps_filter=" >> "$GITHUB_OUTPUT"
        else
          echo "ps_skip=false" >> "$GITHUB_OUTPUT"
          PS_JOINED=$(IFS='|'; echo "${PS_PARTS[*]}")
          echo "ps_filter=$PS_JOINED" >> "$GITHUB_OUTPUT"
        fi

        # Build AzureCLI test filter
        CLI_PARTS=()
        [[ "${{ steps.changes.outputs.keyvault }}"        == "true" ]] && CLI_PARTS+=("FullyQualifiedName~AzureCLI.KeyVault")
        [[ "${{ steps.changes.outputs.acr }}"             == "true" ]] && CLI_PARTS+=("FullyQualifiedName~AzureCLI.ContainerRegistry")
        [[ "${{ steps.changes.outputs.storage }}"         == "true" ]] && CLI_PARTS+=("FullyQualifiedName~AzureCLI.Storage")
        [[ "${{ steps.changes.outputs.servicebus }}"      == "true" ]] && CLI_PARTS+=("FullyQualifiedName~AzureCLI.ServiceBus")
        [[ "${{ steps.changes.outputs.authorization }}"   == "true" ]] && CLI_PARTS+=("FullyQualifiedName~AzureCLI.Authorization")
        [[ "${{ steps.changes.outputs.entra }}"           == "true" ]] && CLI_PARTS+=("FullyQualifiedName~AzureCLI.Entra")
        [[ "${{ steps.changes.outputs.managedidentity }}" == "true" ]] && CLI_PARTS+=("FullyQualifiedName~AzureCLI.ManagedIdentity")
        [[ "${{ steps.changes.outputs.resourcegroup }}"   == "true" ]] && CLI_PARTS+=("FullyQualifiedName~AzureCLI.ResourceGroup")
        [[ "${{ steps.changes.outputs.resourcemanager }}" == "true" ]] && CLI_PARTS+=("FullyQualifiedName~AzureCLI.ResourceManager")
        [[ "${{ steps.changes.outputs.virtualnetwork }}"  == "true" ]] && CLI_PARTS+=("FullyQualifiedName~AzureCLI.VirtualNetwork")

        if [[ "${{ steps.changes.outputs.azurecli }}" == "true" ]]; then
          # CLI test files themselves changed: run all CLI tests
          echo "cli_skip=false" >> "$GITHUB_OUTPUT"
          echo "cli_filter=" >> "$GITHUB_OUTPUT"
        elif [[ ${#CLI_PARTS[@]} -eq 0 ]]; then
          # No CLI-related service or test files changed
          echo "cli_skip=true" >> "$GITHUB_OUTPUT"
          echo "cli_filter=" >> "$GITHUB_OUTPUT"
        else
          echo "cli_skip=false" >> "$GITHUB_OUTPUT"
          CLI_JOINED=$(IFS='|'; echo "${CLI_PARTS[*]}")
          echo "cli_filter=$CLI_JOINED" >> "$GITHUB_OUTPUT"
        fi
    - name: Test
      if: steps.test_filter.outputs.skip != 'true'
      run: |
        FILTER="${{ steps.test_filter.outputs.filter }}"
        EXCLUDE="FullyQualifiedName!~Topaz.Tests.Terraform&FullyQualifiedName!~Topaz.Tests.AzurePowerShell&FullyQualifiedName!~Topaz.Tests.AzureCLI"
        if [[ -n "$FILTER" ]]; then
          FILTER="${FILTER}&${EXCLUDE}"
        else
          FILTER="${EXCLUDE}"
        fi
        dotnet test -m:1 --no-build --verbosity normal --logger trx \
          --collect:"XPlat Code Coverage" \
          --results-directory ${{ github.workspace }}/TestResults \
          --filter "$FILTER"
    - name: Terraform Tests
      if: always() && steps.test_filter.outputs.skip != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || steps.changes.outputs.terraform == 'true')
      run: |
        dotnet test -m:1 --no-build --verbosity normal --logger trx \
          --collect:"XPlat Code Coverage" \
          --results-directory ${{ github.workspace }}/TestResults \
          --filter "FullyQualifiedName~Topaz.Tests.Terraform"
    - name: Build PowerShell container
      if: always() && steps.test_filter.outputs.ps_skip != 'true'
      run: ./scripts/build-powershell-container.sh
    - name: AzurePowerShell Tests
      if: always() && steps.test_filter.outputs.ps_skip != 'true'
      run: |
        FILTER="${{ steps.test_filter.outputs.ps_filter }}"
        if [[ -z "$FILTER" ]]; then
          FILTER="FullyQualifiedName~Topaz.Tests.AzurePowerShell"
        fi
        dotnet test -m:1 --no-build --verbosity normal --logger trx \
          --collect:"XPlat Code Coverage" \
          --results-directory ${{ github.workspace }}/TestResults \
          --filter "$FILTER"
    - name: AzureCLI Tests
      if: always() && steps.test_filter.outputs.cli_skip != 'true'
      run: |
        FILTER="${{ steps.test_filter.outputs.cli_filter }}"
        if [[ -z "$FILTER" ]]; then
          FILTER="FullyQualifiedName~Topaz.Tests.AzureCLI"
        fi
        dotnet test -m:1 --no-build --verbosity normal --logger trx \
          --collect:"XPlat Code Coverage" \
          --results-directory ${{ github.workspace }}/TestResults \
          --filter "$FILTER"
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always() && steps.test_filter.outputs.skip != 'true'
      with:
        large_files: true
        files: |
          ${{ github.workspace }}/**/*.trx
    - name: ReportGenerator
      if: always() && steps.test_filter.outputs.skip != 'true'
      uses: danielpalme/ReportGenerator-GitHub-Action@5.4.8
      with:
        reports: ./TestResults/**/coverage.cobertura.xml
        targetdir: coveragereport
        reporttypes: HtmlSummary;MarkdownSummaryGithub;Badges
    - name: Upload coverage report artifact
      if: always() && steps.test_filter.outputs.skip != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: CoverageReport        
        path: coveragereport
    - name: Add comment to PR
      if: github.event_name == 'pull_request' && steps.test_filter.outputs.skip != 'true'
      run: gh pr comment $PR_NUMBER --body-file coveragereport/SummaryGithub.md
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.number }}
    - name: Publish coverage in build summary
      if: always() && steps.test_filter.outputs.skip != 'true'
      run: |
        if [[ -f coveragereport/SummaryGithub.md ]]; then
          cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        else
          echo "Coverage summary was not generated." >> $GITHUB_STEP_SUMMARY
        fi
      shell: bash
    - name: Update Topaz documentation
      if: github.ref == 'refs/heads/main'
      env:
        TOPAZ_BASE_DOCS_PATH: ${{ github.workspace }}
      run: |
        # Run the documentation generator
        dotnet run --project ./Documentation/Topaz.Documentation.Generator/Topaz.Documentation.Generator.csproj
        
        # Configure git for the action
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add changed files from website directory
        git add ./website/
        
        # Check if there are any changes to commit
        if git diff --staged --quiet; then
          echo "No documentation changes to commit"
        else
          # Commit the changes
          git commit -m "docs: update documentation"
          
          # Push the changes back to the repository
          git push
        fi

