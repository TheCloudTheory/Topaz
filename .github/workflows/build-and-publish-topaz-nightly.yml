name: Build_Test_And_Publish_Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      checks: write
      pull-requests: write
      packages: write
      id-token: write
      attestations: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install certificate
      run: |
        cd certificate
        ./ubuntu-install.sh
    - name: Configure DNS resolution
      run: |
        sudo ./install/install-linux.sh
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Publish Linux x64 (interim for Docker)
      run: |
        dotnet publish ${{ github.workspace }}/Topaz.Host/Topaz.Host.csproj -c Release -r linux-x64 -o ./publish
        mv ./publish/Topaz.Host ./publish/topaz-host-linux-x64
    - name: Test (E2E + CLI only)
      run: dotnet test Topaz.Tests/Topaz.Tests.csproj -m:1 --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage" --results-directory ${{ github.workspace }}/TestResults
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          ${{ github.workspace }}/**/*.trx
    - name: Publish CLI Linux x64
      run: dotnet publish ${{ github.workspace }}/Topaz.CLI/Topaz.CLI.csproj -c Release -r linux-x64 -o ./publish/linux-x64
    - name: Publish CLI Linux arm64
      run: dotnet publish ${{ github.workspace }}/Topaz.CLI/Topaz.CLI.csproj -c Release -r linux-arm64 -o ./publish/linux-arm64
    - name: Publish Host Linux x64
      run: |
        dotnet publish ${{ github.workspace }}/Topaz.Host/Topaz.Host.csproj -c Release -r linux-x64 -o ./publish/host-linux-x64
        mv ./publish/host-linux-x64/Topaz.Host ./publish/host-linux-x64/topaz-host-linux-x64
    - name: Publish Host Linux arm64
      run: |
        dotnet publish ${{ github.workspace }}/Topaz.Host/Topaz.Host.csproj -c Release -r linux-arm64 -o ./publish/host-linux-arm64
        mv ./publish/host-linux-arm64/Topaz.Host ./publish/host-linux-arm64/topaz-host-linux-arm64
    - name: Copy artifacts for Docker
      run: |
        cp -a ./publish/linux-x64/. publish/
        cp -a ./publish/linux-arm64/. publish/
        cp -a ./publish/host-linux-x64/. publish/
        cp -a ./publish/host-linux-arm64/. publish/
    - name: Log in to Docker Hub
      uses: docker/login-action@v3.5.0
      with:
        username: thecloudtheory
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Set up Docker
      uses: docker/setup-docker-action@v4
      with:
        daemon-config: |
          {
            "debug": true,
            "features": {
              "containerd-snapshotter": true
            }
          }
    - name: Build and push CLI Docker image
      id: push-cli
      uses: docker/build-push-action@v6.18.0
      with:
        context: .
        file: ./Topaz.CLI/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: thecloudtheory/topaz:nightly
    - name: Generate artifact attestation for CLI
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: index.docker.io/thecloudtheory/topaz
        subject-digest: ${{ steps.push-cli.outputs.digest }}
        push-to-registry: true
    - name: Build and push Host Docker image
      id: push-host
      uses: docker/build-push-action@v6.18.0
      with:
        context: .
        file: ./Topaz.Host/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: thecloudtheory/topaz-host:nightly
    - name: Generate artifact attestation for Host
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: index.docker.io/thecloudtheory/topaz-host
        subject-digest: ${{ steps.push-host.outputs.digest }}
        push-to-registry: true
