name: Publish new release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'The workflow run ID to download artifacts from'
        required: true
        type: string
  workflow_run:
    workflows: [Build_Test_And_Publish]
    types: [completed]

permissions:
  packages: write
  contents: write
  actions: read
  id-token: write
  attestations: write
  issues: read

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set run ID
      id: set-run-id
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "RUN_ID=${{ github.event.inputs.run_id }}" >> $GITHUB_OUTPUT
          echo "Using manually provided run ID: ${{ github.event.inputs.run_id }}"
        else
          echo "RUN_ID=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          echo "Using workflow_run event run ID: ${{ github.event.workflow_run.id }}"
        fi
    - name: Download a Build Artifact
      uses: actions/download-artifact@v4.3.0
      with:
        github-token: ${{ github.token }}
        run-id: ${{ steps.set-run-id.outputs.RUN_ID }}
        pattern: "!*.dockerbuild"
    - name: Read tag info
      id: read-tag
      run: |
        TAG=$(cat tag-info/tag-info.txt)
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Using release tag: $TAG"
    - name: Generate release notes
      id: release-notes
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${{ steps.read-tag.outputs.tag }}"
        # Strip trailing .N to derive milestone name, e.g. v1.1-beta.5 -> v1.1-beta
        MILESTONE=$(echo "$TAG" | sed 's/\.[0-9]*$//')
        echo "Looking for milestone: $MILESTONE"

        MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones \
          --jq ".[] | select(.title == \"$MILESTONE\") | .number")

        if [ -z "$MILESTONE_NUMBER" ]; then
          echo "No milestone found for '$MILESTONE', skipping release notes."
          echo "## $TAG" > release-notes.md
          exit 0
        fi

        echo "Found milestone #$MILESTONE_NUMBER"

        gh api "repos/${{ github.repository }}/issues?milestone=$MILESTONE_NUMBER&state=closed&per_page=100" \
          --jq '[.[] | select(.pull_request == null)]' > /tmp/issues.json

        {
          echo "## What's Changed in $TAG"
          echo ""

          BREAKING_COUNT=$(jq '[.[] | select(any(.labels[]; .name == "breaking-change"))] | length' /tmp/issues.json)
          if [ "$BREAKING_COUNT" -gt 0 ]; then
            echo "### ⚠️ Breaking Changes"
            jq -r '.[] | select(any(.labels[]; .name == "breaking-change")) | "- " + .title + " ([#" + (.number|tostring) + "](" + .html_url + "))"' /tmp/issues.json
            echo ""
          fi

          OTHER_COUNT=$(jq '[.[] | select(any(.labels[]; .name == "breaking-change") | not)] | length' /tmp/issues.json)
          if [ "$OTHER_COUNT" -gt 0 ]; then
            echo "### Closed Issues"
            jq -r '.[] | select(any(.labels[]; .name == "breaking-change") | not) | "- " + .title + " ([#" + (.number|tostring) + "](" + .html_url + "))"' /tmp/issues.json
            echo ""
          fi

          if [ "$BREAKING_COUNT" -eq 0 ] && [ "$OTHER_COUNT" -eq 0 ]; then
            echo "_No closed issues found for milestone \`$MILESTONE\`._"
            echo ""
          fi

          echo "**Full Changelog**: https://github.com/${{ github.repository }}/milestone/$MILESTONE_NUMBER?closed=1"
        } > release-notes.md

        echo "Generated release notes:"
        cat release-notes.md
    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.read-tag.outputs.tag }}
        name: ${{ steps.read-tag.outputs.tag }}
        prerelease: true
        body_path: release-notes.md
        files: |
          **/osx-x64/topaz-osx-x64
          **/osx-arm64/topaz-osx-arm64
          **/linux-x64/topaz-linux-x64
          **/win-x64/topaz-win-x64.exe
          **/linux-arm64/topaz-linux-arm64
          **/host-osx-x64/topaz-host-osx-x64
          **/host-osx-arm64/topaz-host-osx-arm64
          **/host-linux-x64/topaz-host-linux-x64
          **/host-win-x64/topaz-host-win-x64.exe
          **/host-linux-arm64/topaz-host-linux-arm64
          **/win-x64/topaz.crt
          **/win-x64/topaz.pfx
    - name: Copy artifacts for Docker
      run: |
        mkdir publish
        cp -a ./linux-x64/. publish/
        cp -a ./linux-arm64/. publish/
        cp -a ./host-linux-x64/. publish/
        cp -a ./host-linux-arm64/. publish/
    - name: Log in to Docker Hub
      uses: docker/login-action@v3.5.0
      with:
        username: thecloudtheory
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Set up Docker
      uses: docker/setup-docker-action@v4
      with:
        daemon-config: |
          {
            "debug": true,
            "features": {
              "containerd-snapshotter": true
            }
          }
    - name: Extract metadata for CLI Docker image
      id: meta
      uses: docker/metadata-action@v5.7.0
      with:
        images: thecloudtheory/topaz
        tags: |
          type=raw,value=${{ steps.read-tag.outputs.tag }}
          type=raw,value=latest
    - name: Build and push CLI Docker image
      id: push
      uses: docker/build-push-action@v6.18.0
      with:
        context: .
        file: ./Topaz.CLI/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    - name: Generate artifact attestation for CLI
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: index.docker.io/thecloudtheory/topaz
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true
    - name: Extract metadata for Host Docker image
      id: meta-host
      uses: docker/metadata-action@v5.7.0
      with:
        images: thecloudtheory/topaz-host
        tags: |
          type=raw,value=${{ steps.read-tag.outputs.tag }}
          type=raw,value=latest
    - name: Build and push Host Docker image
      id: push-host
      uses: docker/build-push-action@v6.18.0
      with:
        context: .
        file: ./Topaz.Host/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta-host.outputs.tags }}
        labels: ${{ steps.meta-host.outputs.labels }}
    - name: Generate artifact attestation for Host
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: index.docker.io/thecloudtheory/topaz-host
        subject-digest: ${{ steps.push-host.outputs.digest }}
        push-to-registry: true
    - name: Trigger Homebrew formula update
      env:
        HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      run: |
        curl -s -X POST \
          -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/TheCloudTheory/homebrew-topaz/dispatches \
          -d "{\"event_type\": \"new-release\", \"client_payload\": {\"tag\": \"${{ steps.read-tag.outputs.tag }}\"}}"
